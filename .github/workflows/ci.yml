name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gate:
    runs-on: ubuntu-latest

    services:
      db:
        image: apache/age:latest
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: infra_twin
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d infra_twin"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 30

    env:
      ADMIN_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/infra_twin
      DATABASE_URL: postgresql://app:app@localhost:5433/infra_twin

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Sync workspace
        run: uv sync

      - name: Migrate
        run: uv run python -m infra_twin.db.migrate

      - name: Test
        run: uv run pytest
