services:
  db:
    image: apache/age:latest
    container_name: infra-twin-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: infra_twin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d infra_twin"]
      interval: 3s
      timeout: 3s
      retries: 30

volumes:
  pgdata:
