[project]
name = "infra-twin-connector-sdk"
version = "0.1.0"
description = "The connector contract: canonical discovery events and the Connector protocol."
requires-python = ">=3.12"
dependencies = [
    "infra-twin-core-model",
    "pydantic>=2.7",
]

[tool.uv.sources]
infra-twin-core-model = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/infra_twin"]
