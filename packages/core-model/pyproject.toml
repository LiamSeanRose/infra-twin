[project]
name = "infra-twin-core-model"
version = "0.1.0"
description = "Canonical Configuration Item (CI) and edge model — single source of truth."
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/infra_twin"]
