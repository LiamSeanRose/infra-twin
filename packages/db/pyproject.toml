[project]
name = "infra-twin-db"
version = "0.1.0"
description = "Tenant-scoped, bitemporal access layer over PostgreSQL + Apache AGE."
requires-python = ">=3.12"
dependencies = [
    "infra-twin-core-model",
    "psycopg[binary]>=3.2",
    "psycopg-pool>=3.2",
]

[tool.uv.sources]
infra-twin-core-model = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/infra_twin"]
