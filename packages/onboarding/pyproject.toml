[project]
name = "infra-twin-onboarding"
version = "0.1.0"
description = "Customer onboarding artifacts: least-privilege read-only IAM role rendering."
requires-python = ">=3.12"
dependencies = [
    "pyyaml>=6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/infra_twin"]
